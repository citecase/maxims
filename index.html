
<style>

  .meaning-label { font-size: 11px; font-weight: 500; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 0.5rem; }
  .meaning-text { font-size: 16px; color: var(--text-primary); line-height: 1.65; margin-bottom: 1rem; }

</style>

<div class="wrap" id="app">
  <h2 class="sr-only" style="position:absolute;left:-9999px;">Legal Maxim of the Day</h2>
  <div class="badge"><i class="ti ti-gavel" aria-hidden="true"></i> Maxim of the day</div>
  <div class="maxim-latin" id="maxim-text"></div>
  <div class="maxim-num" id="maxim-num"></div>
  <button class="reveal-btn" id="reveal-btn" onclick="revealMeaning()">Reveal meaning</button>
  <div class="meaning-card" id="meaning-card" style="display:none;">
    <div class="meaning-label">Meaning</div>
    <div class="meaning-text" id="meaning-text"></div>
    <hr class="divider">
    <div class="example-label">Example</div>
    <div class="example-text" id="example-text"></div>
  </div>
  <div class="nav-row">
    <button class="nav-btn" onclick="changeMaxim(-1)"><i class="ti ti-arrow-left" aria-hidden="true"></i> Previous</button>
    <button class="nav-btn" onclick="goToday()"><i class="ti ti-calendar" aria-hidden="true"></i> Today</button>
    <button class="nav-btn" onclick="changeMaxim(1)">Next <i class="ti ti-arrow-right" aria-hidden="true"></i></button>
  </div>
  <div class="counter" id="counter"></div>
</div>

  { latin: "Causa Sui", meaning: "A person who is legally capable of managing their own affairs.", example: "A minor is not causa sui because they cannot enter into contracts on their own." },
  { latin: "Noscitur a Sociis", meaning: "A word is known by the company it keeps.", example: "In interpreting ambiguous statutes, words are given meaning based on the context in which they appear." },
  { latin: "Nullum Crimen Sine Lege", meaning: "No crime without law.", example: "A person cannot be punished for an act unless it is defined as a crime in law." },

  { latin: "Ultra Vires", meaning: "Beyond the powers.", example: "A company acting ultra vires is performing actions outside its legal powers." },
  { latin: "Causa Mortis", meaning: "In contemplation of death.", example: "A gift made causa mortis is given by someone who believes they are about to die." },
  { latin: "Lex Posterior Derogat Legi Priori", meaning: "The later law repeals the earlier law.", example: "If a new law contradicts an old one, the newer law takes precedence." },
  { latin: "Nemo Debet Esse Judex In Propria Causa", meaning: "No one should be a judge in their own case.", example: "A judge must recuse themselves from cases where they have a personal interest." },
  { latin: "Fidei Defensor", meaning: "Defender of the faith.", example: "A title historically given to English monarchs as protectors of the Christian faith." },
  { latin: "Jus Ad Rem", meaning: "Right to a thing.", example: "A person who has a claim to a property may have jus ad rem, even if they do not currently possess it." },

  { latin: "Non Est Factum", meaning: "It is not his deed.", example: "A person may claim non est factum if they signed a contract under misrepresentation." },
  { latin: "Testamentum Factum", meaning: "The act of making a will.", example: "A testamentum factum is a legally executed will." },
  { latin: "Stare Decisis", meaning: "To stand by things decided.", example: "The principle that courts must follow precedents set by higher courts." },
  { latin: "Ex Nihilo Nihil Fit", meaning: "Nothing comes from nothing.", example: "A contract cannot be valid unless something of value (consideration) is exchanged." },
  { latin: "Bona Fide Purchaser", meaning: "A purchaser who buys property in good faith and for value.", example: "A person who buys goods in bona fide, without knowledge of any defect, may not be held liable." },
  { latin: "Ex Tunc", meaning: "From the beginning.", example: "A contract that is declared void ex tunc is considered void from the start." },

function getDayIndex() {
  const start = new Date(2024, 0, 1);
  const now = new Date();
  const diff = Math.floor((now - start) / (1000 * 60 * 60 * 24));
  return diff % maxims.length;
}

let currentIndex = getDayIndex();
let revealed = false;

function render() {
  const m = maxims[currentIndex];
  const isToday = currentIndex === getDayIndex();
  document.getElementById('maxim-text').textContent = m.latin;
  document.getElementById('maxim-num').textContent = `Maxim #${currentIndex + 1} of ${maxims.length}${isToday ? ' · Today\'s maxim' : ''}`;
  document.getElementById('meaning-text').textContent = m.meaning;
  document.getElementById('example-text').textContent = m.example;
  document.getElementById('meaning-card').style.display = 'none';
  document.getElementById('reveal-btn').style.display = 'inline-block';
  document.getElementById('reveal-btn').textContent = 'Reveal meaning';
  revealed = false;
}

function revealMeaning() {
  document.getElementById('meaning-card').style.display = 'block';
  document.getElementById('reveal-btn').style.display = 'none';
  revealed = true;
}

function changeMaxim(dir) {
  currentIndex = ((currentIndex + dir) + maxims.length) % maxims.length;
  render();
}

function goToday() {
  currentIndex = getDayIndex();
  render();
}

render();
</script>
